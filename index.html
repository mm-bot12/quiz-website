<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
  
  <title>Quiz Website</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <h1>Welcome to My Quiz!</h1>
  <p data-hover="শা*, তোর সিলেবাস শেষ হইছে?">First commit test page.</p>
  <div class="button-group">
    <button class="creator-btn" onclick="checkPasskey()">Create Quiz</button>
    
    <button class="exam-btn" onclick="startExamSequence()">"আমি ছোট মানুষ"</button>
  </div>
<div id="cinema-overlay" class="cinema-overlay">
    <div class="batman-container">
      
      <div class="batman-cowl">
        <svg viewBox="0 0 400 180" class="batman-svg-mask">
          <path class="eye-path left-eye" d="M40,85 Q110,65 170,95 Q115,115 40,85 Z" />
          <path class="eye-path right-eye" d="M360,85 Q290,65 230,95 Q285,115 360,85 Z" />
        </svg>
      </div>
      
      <h2 class="porsche-text">GET READY</h2>
      <div id="countdown" class="countdown-num">10</div>
    </div>
  </div>
  <script>
    function checkPasskey() {
      // Prompt user for the key
      const password = prompt("Enter the Secret Passkey to access the creator page:");
      
      if (password === "maimuna is the best") {
        alert("Access Granted! Welcome, Boss. 😎");
        window.location.href = "quiz-creator.html";
      } else if (password !== null) {
        // If they typed the wrong thing
        alert("Access Denied! সিলেবাস শেষ না করে এখানে কী? ❌");
      }
    }
    function startExamSequence() {
      const overlay = document.getElementById('cinema-overlay');
      const countdownEl = document.getElementById('countdown');
      
      // Instantly blacks out the whole window
      overlay.classList.add('active');
      
      let timeLeft = 10;
      const timer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft;
        
        if (timeLeft <= 0) {
          clearInterval(timer);
          window.location.href = "exam.html";
        }
      }, 1000);
    }
  </script>
</body>
  
</html>
